const COLORS = { 4: '#f4a261', 8: '#2a9d8f', 12: '#e76f51', 16: '#457b9d' };
const plotIds = {};

function makeTraces(z, M) {
  const path = allData[z][M];
  const xs = path.map(p => p.x), ys = path.map(p => p.y), zs = path.map(p => p.z);
  const color = COLORS[M];
  return [
    { x: xs, y: ys, z: zs, mode: 'lines', type: 'scatter3d', name: `M=${M}`,
      line: { color, width: 3 }, showlegend: true },
    { x: xs, y: ys, z: zs, mode: 'markers', type: 'scatter3d', showlegend: false,
      marker: { size: path.map((p,i) => i===0 ? 10 : 6), color: path.map((p,i) => i===0 ? '#fff' : color),
        symbol: path.map((p,i) => i===0 ? 'diamond' : 'circle'),
        line: { color, width: 1 } },
      text: path.map(p => `Step ${p.s}<br>Az: ${p.az}°<br>(${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)})`),
      hoverinfo: 'text' }
  ];
}

    },
    legend: { font: { color: '#ccc' }, bgcolor: 'rgba(0,0,0,0.3)' },
    margin: { l: 0, r: 0, t: 30, b: 0 }
  };
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const contentsEl = document.getElementById('contents');

  for (const z of [2,3,4,5,6,7]) {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (z === 2 ? ' active' : '');
    btn.textContent = `z = ${z}m`;
    btn.onclick = () => switchTab(z);
    tabsEl.appendChild(btn);

    // Tab content
    const div = document.createElement('div');
    div.id = `tab-${z}`;
    div.className = 'tab-content' + (z === 2 ? ' active' : '');

    // Stats row
    div.innerHTML = `
      <div class="info-row">
        ${[4,8,12,16].map(M => {
          const p = allData[z][M];
          const azs = p.slice(1).map(v => v.az).sort((a,b)=>a-b);
          const gaps = azs.map((a,i) => i===0 ? (a - azs[azs.length-1] + 360)%360 : a - azs[i-1]);
          const maxGap = Math.max(...gaps).toFixed(1);
          return `<div class="info-card" style="border-color:${COLORS[M]}">
            <h3>M=${M}</h3>
            <div class="val" style="color:${COLORS[M]}">${M} steps</div>
            <div style="font-size:12px;color:#888;margin-top:4px">max gap: ${maxGap}°</div>
          </div>`;
        }).join('')}
      </div>
      <div class="plot-row">
        <div class="plot-box"><div class="plot-title">3D Path (All M)</div><div id="plot3d-all-${z}" style="height:480px"></div></div>
        <div class="plot-box"><div class="plot-title">Top-down XY View (All M)</div><div id="plot2d-${z}" style="height:480px"></div></div>
      </div>
    `;
    contentsEl.appendChild(div);
    plotIds[z] = false;
  }
}

function plotTab(z) {
  if (plotIds[z]) return;
  plotIds[z] = true;

  // 3D plot with all M
  const traces3d = [];
  for (const M of [4,8,12,16]) traces3d.push(...makeTraces(z, M));
  Plotly.newPlot(`plot3d-all-${z}`, traces3d, layout3d(`z=${z}m First Viewpoint`), {responsive:true});

  // 2D top-down
  const traces2d = [];
  for (const M of [4,8,12,16]) {
    const path = allData[z][M];
    traces2d.push({
      x: path.map(p=>p.x), y: path.map(p=>p.y), mode:'lines+markers',
      name:`M=${M}`, line:{color:COLORS[M],width:2},
      marker:{size:path.map((_,i)=>i===0?12:7), color:path.map((_,i)=>i===0?'#fff':COLORS[M]),
        symbol:path.map((_,i)=>i===0?'star':'circle'), line:{color:COLORS[M],width:1}},
      text: path.map(p=>`Step ${p.s}<br>Az:${p.az}°`), hoverinfo:'text'
    });
  }
  Plotly.newPlot(`plot2d-${z}`, traces2d, {
    paper_bgcolor:'#16213e', plot_bgcolor:'#16213e',
    xaxis:{title:'X (m)',color:'#666',gridcolor:'#333',zerolinecolor:'#555',scaleanchor:'y'},
    yaxis:{title:'Y (m)',color:'#666',gridcolor:'#333',zerolinecolor:'#555'},
    legend:{font:{color:'#ccc'},bgcolor:'rgba(0,0,0,0.3)'},
    margin:{l:50,r:10,t:10,b:50}
  }, {responsive:true});
}

function switchTab(z) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', [2,3,4,5,6,7][i]===z));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${z}`).classList.add('active');
  setTimeout(() => plotTab(z), 10);
}

buildTabs();
window.addEventListener('load', () => plotTab(2));
</script>
</body>
</html>
